<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - TechBooks</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="../images/Copilot_20251218_104431.png">
    <style>
        body { background: #0f0f23; font-family: 'Poppins', sans-serif; color: white; }
        .profile-container { max-width: 700px; margin: 120px auto 40px; padding: 0 20px; }
        .profile-card { background: #1a1a2e; border-radius: 15px; padding: 40px; margin-bottom: 20px; }
        .profile-picture-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .profile-picture-wrapper { position: relative; width: 120px; height: 120px; margin-bottom: 15px; }
        .profile-picture-wrapper img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #f3971b; }
        .default-avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #f3971b, #e08515); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; border: 3px solid #f3971b; }
        .upload-overlay { position: absolute; bottom: 0; right: 0; background: #f3971b; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .upload-overlay:hover { background: #e08515; transform: scale(1.1); }
        .upload-overlay i { color: white; font-size: 0.9rem; }
        #picture-input { display: none; }
        .profile-name { font-size: 1.5rem; font-weight: 600; color: #f3971b; }
        .profile-role { color: #888; font-size: 0.9rem; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #ccc; margin-bottom: 8px; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #16213e; color: white; font-size: 1rem; font-family: 'Poppins', sans-serif; }
        .form-group input:focus { border-color: #f3971b; outline: none; }
        .section-title { color: #f3971b; font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .save-btn { width: 100%; padding: 12px; background: #f3971b; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; transition: 0.3s; }
        .save-btn:hover { background: #e08515; }
        .save-btn:disabled { background: #555; cursor: not-allowed; }
        @media (max-width: 768px) { .profile-container { margin-top: 90px; } .profile-card { padding: 25px; } }
    </style>
</head>
<body>
    <header class="main-header">
        <nav class="nav-container">
            <div class="logo"><i class="fas fa-book-reader"></i><span>TechBooks</span></div>
            <ul class="nav-links">
                <li><a href="../index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="shop.html"><i class="fas fa-shopping-bag"></i> Shop</a></li>
                <li><a href="login.html" class="login-btn"><i class="fas fa-user"></i> Login</a></li>
            </ul>
            <div class="header-actions"><button class="mobile-menu-toggle"><i class="fas fa-bars"></i></button></div>
        </nav>
    </header>

    <div class="profile-container">
        <!-- Profile Picture -->
        <div class="profile-card">
            <div class="profile-picture-section">
                <div class="profile-picture-wrapper">
                    <div class="default-avatar" id="default-avatar"><i class="fas fa-user"></i></div>
                    <img id="profile-img" src="" alt="Profile" style="display:none">
                    <label for="picture-input" class="upload-overlay" title="Change profile picture">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type="file" id="picture-input" accept="image/jpeg,image/png,image/gif,image/webp" />
                </div>
                <div class="profile-name" id="profile-username">Loading...</div>
                <div class="profile-role" id="profile-role">User</div>
            </div>
        </div>

        <!-- Update Info -->
        <div class="profile-card">
            <div class="section-title"><i class="fas fa-user-edit"></i> Update Information</div>
            <form id="update-info-form">
                <div class="form-group"><label>Username</label><input type="text" id="update-username" required minlength="3" maxlength="50" /></div>
                <div class="form-group"><label>Email</label><input type="email" id="update-email" required maxlength="100" /></div>
                <button type="submit" class="save-btn" id="info-btn"><i class="fas fa-save"></i> Save Changes</button>
            </form>
        </div>

        <!-- Change Password -->
        <div class="profile-card">
            <div class="section-title"><i class="fas fa-lock"></i> Change Password</div>
            <form id="change-password-form">
                <div class="form-group"><label>Current Password</label><input type="password" id="current-password" required /></div>
                <div class="form-group"><label>New Password</label><input type="password" id="new-password" required minlength="6" /></div>
                <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirm-password" required minlength="6" /></div>
                <button type="submit" class="save-btn" id="password-btn"><i class="fas fa-key"></i> Change Password</button>
            </form>
        </div>
    </div>

    <div id="fixed-toast-box" style="position:fixed;top:100px;right:20px;z-index:999999;"></div>
    <script src="../js/auth-check.js"></script>
    <script>
    (function() {
        document.addEventListener("DOMContentLoaded", async function() {
            await loadProfile();
            document.getElementById("picture-input").addEventListener("change", handlePictureUpload);
            document.getElementById("update-info-form").addEventListener("submit", handleUpdateInfo);
            document.getElementById("change-password-form").addEventListener("submit", handleChangePassword);
        });

        async function loadProfile() {
            try {
                var res = await fetch("../php/user/get_profile.php");
                var data = await res.json();
                if (!data.loggedIn) { window.location.href = "login.html"; return; }
                var user = data.data;
                document.getElementById("profile-username").textContent = user.username;
                document.getElementById("profile-role").textContent = user.role === 'admin' ? 'Administrator' : 'Member';
                document.getElementById("update-username").value = user.username;
                document.getElementById("update-email").value = user.email;
                if (user.profile_picture) showProfilePicture("../" + user.profile_picture);
            } catch(e) { window.location.href = "login.html"; }
        }

        function showProfilePicture(url) {
            var img = document.getElementById("profile-img");
            var avatar = document.getElementById("default-avatar");
            img.src = url;
            img.style.display = "block";
            avatar.style.display = "none";
        }

        async function handlePictureUpload(e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) { showProfilePicture(ev.target.result); };
            reader.readAsDataURL(file);

            var formData = new FormData();
            formData.append("profile_picture", file);
            try {
                var res = await fetch("../php/user/upload_profile_picture.php", { method: "POST", body: formData });
                var data = await res.json();
                showToast(data.message, data.success ? "success" : "error");
            } catch(err) { showToast("Error uploading picture.", "error"); }
        }

        async function handleUpdateInfo(e) {
            e.preventDefault();
            var btn = document.getElementById("info-btn");
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            try {
                var res = await fetch("../php/user/update_profile.php", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "update_info", username: document.getElementById("update-username").value, email: document.getElementById("update-email").value })
                });
                var data = await res.json();
                showToast(data.message, data.success ? "success" : "error");
                if (data.success) document.getElementById("profile-username").textContent = data.data.username;
            } catch(err) { showToast("Error connecting to server.", "error"); }
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
        }

        async function handleChangePassword(e) {
            e.preventDefault();
            var newPass = document.getElementById("new-password").value;
            var confirmPass = document.getElementById("confirm-password").value;
            if (newPass !== confirmPass) { showToast("New passwords do not match.", "error"); return; }
            var btn = document.getElementById("password-btn");
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
            try {
                var res = await fetch("../php/user/update_profile.php", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "change_password", current_password: document.getElementById("current-password").value, new_password: newPass, confirm_password: confirmPass })
                });
                var data = await res.json();
                showToast(data.message, data.success ? "success" : "error");
                if (data.success) document.getElementById("change-password-form").reset();
            } catch(err) { showToast("Error connecting to server.", "error"); }
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-key"></i> Change Password';
        }

        function showToast(msg, type) {
            var tc = document.getElementById("fixed-toast-box");
            var t = document.createElement("div");
            t.style.cssText = "padding:15px 25px;border-radius:10px;display:flex;align-items:center;gap:10px;margin-bottom:10px;font-family:Poppins,sans-serif;font-size:0.95rem;max-width:420px;box-shadow:0 5px 20px rgba(0,0,0,0.4);color:white;cursor:pointer;opacity:0;transform:translateX(100%);transition:all 0.4s ease;background:" + (type === "success" ? "linear-gradient(135deg,#4caf50,#2e7d32)" : "linear-gradient(135deg,#ff4444,#c62828)");
            t.innerHTML = '<i class="fas ' + (type === "success" ? "fa-check-circle" : "fa-exclamation-circle") + '"></i><span>' + msg + '</span>';
            t.onclick = function(){t.style.opacity="0";setTimeout(function(){t.remove();},400);};
            tc.appendChild(t);
            setTimeout(function(){t.style.opacity="1";t.style.transform="translateX(0)";},100);
            setTimeout(function(){t.style.opacity="0";t.style.transform="translateX(100%)";setTimeout(function(){if(t.parentElement)t.remove();},400);},5000);
        }
    })();
    </script>
</body>
</html>
